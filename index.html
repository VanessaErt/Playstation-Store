<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Playstation Store</title>
</head>

<body>

    <div class="container">

        <div class="navbar">
            <img class="logo" src="./assets/logo.png" alt="logo">
            <nav>
                <ul id="menu-list">
                    <li class="nav-li"><a class="nav-link">Consoles</a></li>
                    <li class="nav-li"><a class="nav-link">Acessórios</a></li>
                    <li class="nav-li"><a class="nav-link">Controles</a></li>
                    <li class="nav-li"><a class="nav-link">Outros</a></li>
                </ul>
            </nav>
            <img src="./assets/menu.png" alt="botao-menu" class="menu-icon" onclick="showMenu()">
        </div>

        <div class="row">
            <div class="column-1">
                <h2>PS5 Dualshok</h2>
                <h3>Wireless Controller for PlayStation</h3>
                <p>Controle Original</p>
                <h4>R$ 222,50</h4>
                <button class="buy">Comprar Agora <img src="./assets/arrow.png" alt="seta"> </button>
            </div> 

            <div class="column-2">
                <img class="controller" src="./assets/controller.png" alt="Controle">
                <div class="color-box"></div>
                <button class="add-cart">
                    <img src="./assets/add.png" alt="adicionar-ao-carrinho">        
                </button>
            </div>
        </div>    
          
        <div class="social-links">
            <img src="./assets/fb.png">
            <img src="./assets/ig.png">
            <img src="./assets/tw.png">
        </div>
    </div>   
</body>

<script> 
    const menulist = document.getElementById("menu-list")
    menulist.style.maxHeight = "0px"
    let timer; 

    function showMenu() {
        clearTimeout(timer)
        console.log(menulist.style.maxHeight)
        if(menulist.style.maxHeight == "0px"){
            menulist.style.maxHeight = "120px"
        } else {
            menulist.style.maxHeight = "0px"
        }
        timer = setTimeout(function() {
            if(menulist.style.maxHeight == "120px"){
            menulist.style.maxHeight = "0px"
        }
        }, 4000)
    }   
</script>
</html>
